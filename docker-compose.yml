services:
  postgres:
    image: postgres:16-alpine
    container_name: zbx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  zabbix-server:
    build:
      context: .
      dockerfile: docker/zabbix-server/Dockerfile
    container_name: zbx-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${ZBX_SERVER_PORT}:10051"

  zabbix-agent2:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    container_name: zbx-agent2
    restart: unless-stopped
    depends_on:
      zabbix-server:
        condition: service_started
    network_mode: "service:zabbix-server"
    pid: "service:zabbix-server"
    environment:
      ZBX_HOSTNAME: ${ZBX_AGENT2_HOSTNAME:-Zabbix server}
      ZBX_SERVER_HOST: ${ZBX_AGENT2_SERVER_HOST:-127.0.0.1}
      ZBX_SERVER_ACTIVE: ${ZBX_AGENT2_SERVER_ACTIVE:-127.0.0.1}
      ZBX_LISTENPORT: ${ZBX_AGENT2_LISTENPORT:-10050}

  zabbix-web:
    build:
      context: .
      dockerfile: docker/zabbix-web/Dockerfile
    container_name: zbx-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: ${PHP_TZ}
    ports:
      - "${ZBX_WEB_PORT}:8080"

  tenant-provisioner-go:
    build:
      context: .
      dockerfile: docker/provisioner-go/Dockerfile
    container_name: tenant-provisioner-go
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      zabbix-web:
        condition: service_started

volumes:
  postgres_data:
